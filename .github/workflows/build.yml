name: Build installers (Windows .exe + Linux .deb + macOS .dmg)

# Windows makinesi olmadan gerçek bir Windows kurulum .exe'si üretmenin temiz
# yolu: build gerçek windows-latest runner'da koşar, npm install win prebuild'leri
# kendi çeker, electron-builder NSIS installer üretir. Linux .deb de aynı anda çıkar.
#
# Tetikleme:
#   - bir sürüm tag'i push edilince (v*)  → .exe, .deb ve .dmg release'e eklenir
#   - Actions sekmesinden "Run workflow"  → üç paket de indirilebilir artifact olur

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Required quality gate
    uses: ./.github/workflows/quality.yml

  windows:
    name: Windows installer (.exe)
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Uygulama, >4GB modelleri Electron'un V8 sınırı dışında koşturmak için
      # harici bir Node worker'ı paketli node ile çalıştırır. Repo'daki
      # vendor/node-bin/node bir LINUX binary'sidir — Windows build'i için
      # yerine gerçek bir Windows node.exe koyuyoruz.
      - name: Bundle a Windows Node for the inference worker
        shell: pwsh
        run: |
          Remove-Item -Force vendor/node-bin/node -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path vendor/node-bin | Out-Null
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v20.18.1/win-x64/node.exe" -OutFile "vendor/node-bin/node.exe"

      - name: Build renderer + main (electron-vite)
        run: npm run build

      - name: Package Windows NSIS installer
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: error

  linux:
    name: Linux package (.deb)
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # vendor/ is gitignored → provide the bundled Node the worker needs (linux-x64),
      # otherwise the CI-built .deb ships without the >4GB inference worker runtime.
      - name: Provide the bundled Node for the inference worker
        run: |
          mkdir -p vendor/node-bin
          curl -fsSL https://nodejs.org/dist/v20.18.1/node-v20.18.1-linux-x64.tar.gz -o /tmp/node.tar.gz
          mkdir -p /tmp/nodeextract
          tar -xzf /tmp/node.tar.gz -C /tmp/nodeextract --strip-components=1
          cp /tmp/nodeextract/bin/node vendor/node-bin/node
          chmod +x vendor/node-bin/node

      - name: Build renderer + main (electron-vite)
        run: npm run build

      - name: Package Linux .deb
        run: npx electron-builder --linux deb --publish never

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb
          if-no-files-found: error

  macos:
    name: macOS installer (.dmg, Apple Silicon)
    needs: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # vendor/ is gitignored, so vendor/node-bin does NOT exist in the checkout.
      # The >4GB inference worker runs on a bundled Node — provide a darwin-arm64 one.
      - name: Provide the bundled Node for the inference worker
        run: |
          mkdir -p vendor/node-bin
          curl -fsSL https://nodejs.org/dist/v20.18.1/node-v20.18.1-darwin-arm64.tar.gz -o /tmp/node.tar.gz
          mkdir -p /tmp/nodeextract
          tar -xzf /tmp/node.tar.gz -C /tmp/nodeextract --strip-components=1
          cp /tmp/nodeextract/bin/node vendor/node-bin/node
          chmod +x vendor/node-bin/node

      - name: Build renderer + main (electron-vite)
        run: npm run build

      - name: Package macOS .dmg (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dmg --publish never

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          if-no-files-found: error

  release:
    name: Attach installers to the release
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Attach .exe + .deb + .dmg to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # No body/body_path and NO generate_release_notes: the release is created
          # WITH authored English notes via `gh release create --notes-file` BEFORE
          # this job runs; softprops only sets fields it is given, so omitting the
          # body preserves those notes. generate_release_notes:true clobbered them.
          files: |
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.deb
            dist-artifacts/**/*.dmg
          # Keep false: a partial platform build must still publish the installers
          # that DID build rather than failing the whole attach step.
          fail_on_unmatched_files: false
